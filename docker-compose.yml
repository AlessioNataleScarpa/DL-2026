services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: dl2026_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://backend:8000/v1
      - OPENAI_API_KEY=required-placeholder-key
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: dl2026_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-4-31b-it}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  open-webui-data:
