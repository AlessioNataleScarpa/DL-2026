services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: dl2026_open_webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - backend
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://backend:8000/v1
      - OPENAI_API_KEY=required-placeholder-key
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: dl2026_backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      - ./backend:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://ollama:11434/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-phi3}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: dl2026_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  open-webui-data:
  ollama_data:
